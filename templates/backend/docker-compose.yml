version: '3.8'

services:
  api:
    build: .
    container_name: zenntechinc-api
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/zenntechinc
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
    volumes:
      - ./assets/uploads:/app/assets/uploads

  mongo:
    image: mongo:7
    container_name: zenntechinc-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: zenntechinc-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
